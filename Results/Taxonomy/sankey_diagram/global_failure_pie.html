<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <title>Global failure types (n=1720)</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; }
    .title { padding: 12px 20px; font-size: 18px; font-weight: 600; color: #333; }
  </style>
</head>
<body>
  <div class="title">Global failure types (total 1,720 samples)</div>
  <div id="chart" style="width:100%;"></div>
  <script>
    var data = [{
      type: "pie",
      values: [976, 350, 334, 60],
      labels: ["Encryption", "Variable Renaming", "Dead Code", "Comment Dependency"],
      hovertemplate: "%{label}<br>%{value} (%{percent})<extra></extra>",
      textinfo: "label+percent",
      textposition: "outside",
      marker: {
        colors: ["rgba(252,141,98,0.92)", "rgba(141,160,203,0.92)", "rgba(102,194,165,0.92)", "rgba(229,196,148,0.92)"]
      },
      pull: [0, 0, 0, 0]
    }];
    var layout = {
      title: { text: "Impact of each failure type on total (1,720)", font: { size: 14 } },
      margin: { l: 20, r: 20, t: 48, b: 20 },
      height: 420,
      showlegend: true,
      legend: { orientation: "h", y: 1.08, xanchor: "center", x: 0.5 },
      paper_bgcolor: "rgba(250,250,250,0)",
      plot_bgcolor: "rgba(250,250,250,0)",
      font: { size: 11, family: "Inter, system-ui, sans-serif" }
    };
    Plotly.newPlot("chart", data, layout, { responsive: true });
  </script>
</body>
</html>
